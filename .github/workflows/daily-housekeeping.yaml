name: Daily Security Housekeeping
on:
  schedule:
    - cron: "0 7 * * 1-5"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  create-checklist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'daily-security',
            });

            const date = new Date().toISOString().split('T')[0];
            const alertsUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/security/dependabot`;

            const body = [
              `## Daily Security Housekeeping — ${date}`,
              '',
              '### Checklist',
              '- [ ] Review and merge pending Dependabot PRs',
              `- [ ] Check [Dependabot alerts](${alertsUrl}) for CVEs`,
              '- [ ] Run `make lint-check` locally',
              '- [ ] Update any urgent dependency patches',
              '- [ ] Review GitHub security advisories',
              '',
              '---',
              '*Auto-generated by daily-housekeeping workflow*',
            ].join('\n');

            if (openIssues.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: openIssues[0].number,
                state: 'closed',
              });
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Daily Security Housekeeping — ${date}`,
              body,
              labels: ['daily-security'],
            });
