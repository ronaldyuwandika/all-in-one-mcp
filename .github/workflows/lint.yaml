name: Lint
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      go: ${{ steps.filter.outputs.go }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - 'mcp/credential-vault/**'
              - 'mcp/pr-reviewer/**'
            go:
              - 'mcp/reasoning-memory/**'
              - '**/go.mod'
              - '**/go.sum'

  python-lint:
    needs: changes
    if: ${{ needs.changes.outputs.python == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        id: ruff
        run: |
          exitcode=0
          ruff check mcp/credential-vault mcp/pr-reviewer --exclude mcp/pr-reviewer/.venv > /tmp/ruff-output.txt 2>&1 || exitcode=$?
          echo "exitcode=$exitcode" >> "$GITHUB_OUTPUT"
          exit $exitcode
      - name: Post ruff report
        uses: actions/github-script@v9
        if: always() && github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            let output = '';
            try { output = fs.readFileSync('/tmp/ruff-output.txt', 'utf8').trim(); } catch { output = ''; }
            const exitcode = parseInt('${{ steps.ruff.outputs.exitcode }}');
            const pass = exitcode === 0;
            const lines = (output || '').split('\n').filter(l => /^\S+:\d+:\d+:/.test(l));
            const SeverityMap = { 'E': 'Error', 'W': 'Warning', 'F': 'Fatal', 'I': 'Info', 'N': 'Note', 'B': 'Error' };
            const sevCounts = {};
            lines.forEach(l => {
              const m = l.match(/: \S+\s+(\S)/);
              const sev = m ? (SeverityMap[m[1]] || 'Warning') : 'Warning';
              sevCounts[sev] = (sevCounts[sev] || 0) + 1;
            });
            let body = pass
              ? `## ✅ Ruff — Passing\n\nClean — no issues found.\n`
              : `## ❌ Ruff — Failing\n\n**${lines.length}** issue${lines.length !== 1 ? 's' : ''} found.\n\n| Severity | Count |\n|----------|------|\n${Object.entries({Error:0,Warning:0,Info:0}).filter(([s]) => sevCounts[s]).map(([s]) => `| ${s} | ${sevCounts[s] || 0} |`).join('\n')}\n`;
            if (lines.length > 0) {
              body += `\n<details>\n<summary>🔍 Findings</summary>\n\n`;
              body += '| File | Line | Rule | Detail |\n|------|------|------|--------|\n';
              lines.slice(0, 25).forEach((l) => {
                const m = l.match(/^(.+?):(\d+):(\d+):\s*(\S+)\s*(.+)$/);
                if (m) body += `| \`${m[1].replace('mcp/', '')}\` | ${m[2]} | \`${m[4]}\` | ${m[5]} |\n`;
              });
              if (lines.length > 25) body += `| ... | | | *${lines.length - 25} more* |\n`;
              body += `</details>\n`;
            }
            body += `\n<details><summary>📋 Raw Log</summary>\n\n\`\`\`\n${output.slice(0, 3000)}\n\`\`\`\n</details>\n\n---`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  go-lint:
    needs: changes
    if: ${{ needs.changes.outputs.go == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: mcp/reasoning-memory/go.mod
      - name: Run golangci-lint
        id: golangci
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.12.2
          working-directory: .
          args: ./...
