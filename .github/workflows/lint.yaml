name: Lint
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check mcp/credential-vault mcp/pr-reviewer

  go-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: mcp/reasoning-memory/go.mod
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: mcp/reasoning-memory
