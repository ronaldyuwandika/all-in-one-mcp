name: Lint
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      go: ${{ steps.filter.outputs.go }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - 'mcp/credential-vault/**'
              - 'mcp/pr-reviewer/**'
            go:
              - 'mcp/reasoning-memory/**'
              - '**/go.mod'
              - '**/go.sum'

  python-lint:
    needs: changes
    if: ${{ needs.changes.outputs.python == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        id: ruff
        continue-on-error: true
        run: ruff check mcp/credential-vault mcp/pr-reviewer --exclude mcp/pr-reviewer/.venv
      - name: Post lint result comment
        uses: actions/github-script@v7
        if: always() && github.event_name == 'pull_request'
        with:
          script: |
            const status = '${{ steps.ruff.outcome }}' === 'success' ? '✅ Pass' : '❌ Fail';
            const body = `### Python Lint (ruff) — ${status}\n\n${status === '✅ Pass' ? 'No issues found.' : 'Lint errors detected. Check the job logs for details.'}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  go-lint:
    needs: changes
    if: ${{ needs.changes.outputs.go == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: mcp/reasoning-memory/go.mod
      - name: Run golangci-lint
        id: golangci
        continue-on-error: true
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: mcp/reasoning-memory
      - name: Post lint result comment
        uses: actions/github-script@v7
        if: always() && github.event_name == 'pull_request'
        with:
          script: |
            const status = '${{ steps.golangci.outcome }}' === 'success' ? '✅ Pass' : '❌ Fail';
            const body = `### Go Lint (golangci-lint) — ${status}\n\n${status === '✅ Pass' ? 'No issues found.' : 'Lint errors detected. Check the job logs for details.'}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
