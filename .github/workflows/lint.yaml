name: Lint
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      go: ${{ steps.filter.outputs.go }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - 'mcp/credential-vault/**'
              - 'mcp/pr-reviewer/**'
            go:
              - 'mcp/reasoning-memory/**'
              - '**/go.mod'
              - '**/go.sum'

  python-lint:
    needs: changes
    if: ${{ needs.changes.outputs.python == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        id: ruff
        run: |
          exitcode=0
          ruff check mcp/credential-vault mcp/pr-reviewer --exclude mcp/pr-reviewer/.venv > /tmp/ruff-output.txt 2>&1 || exitcode=$?
          echo "exitcode=$exitcode" >> "$GITHUB_OUTPUT"
          exit $exitcode
      - name: Post ruff report
        uses: actions/github-script@v9
        if: always() && github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            let output = '';
            try { output = fs.readFileSync('/tmp/ruff-output.txt', 'utf8').trim(); } catch { output = ''; }
            const exitcode = parseInt('${{ steps.ruff.outputs.exitcode }}');
            const pass = exitcode === 0;
            const lines = (output || '').split('\n').filter(l => /^\S+:\d+:\d+:/.test(l));
            let body = `## 🐍 Python Lint (ruff) ${pass ? '✅' : '❌'}\n\n**Result:** ${pass ? '✅ Pass' : '❌ Fail'} — ${lines.length} issue${lines.length !== 1 ? 's' : ''} found\n\n`;
            if (lines.length > 0) {
              body += '| # | File | Line | Rule | Message |\n|---|------|------|------|---------|\n';
              const show = lines.slice(0, 25);
              show.forEach((l, i) => {
                const parts = l.match(/^(.+?):(\d+):(\d+):\s*(\S+)\s*(.+)$/);
                if (parts) {
                  const file = parts[1].replace('mcp/', '');
                  body += `| ${i+1} | \`${file}\` | ${parts[2]} | \`${parts[4]}\` | ${parts[5]} |\n`;
                }
              });
              if (lines.length > 25) {
                body += `| ... | *${lines.length - 25} more* | | | |\n`;
              }
              body += '\n';
              const byRule = {};
              lines.forEach(l => {
                const m = l.match(/: \S+\s+(\S+)/);
                if (m) byRule[m[1]] = (byRule[m[1]] || 0) + 1;
              });
              body += '**Breakdown by rule:**\n';
              Object.entries(byRule).sort((a,b) => b[1]-a[1]).forEach(([rule, count]) => {
                body += `- \`${rule}\`: ${count}\n`;
              });
            } else {
              body += '✅ All checks passed. No lint issues found.\n';
            }
            body += `\n<details><summary>Full output</summary>\n\n\`\`\`\n${output.slice(0, 3000)}\n\`\`\`\n</details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  go-lint:
    needs: changes
    if: ${{ needs.changes.outputs.go == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: mcp/reasoning-memory/go.mod
      - name: Run golangci-lint
        id: golangci
        working-directory: mcp/reasoning-memory
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          exitcode=0
          golangci-lint run ./... > /tmp/golangci-output.txt 2>&1 || exitcode=$?
          echo "exitcode=$exitcode" >> "$GITHUB_OUTPUT"
          exit $exitcode
      - name: Post golangci-lint report
        uses: actions/github-script@v9
        if: always() && github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            let output = '';
            try { output = fs.readFileSync('/tmp/golangci-output.txt', 'utf8').trim(); } catch { output = ''; }
            const exitcode = parseInt('${{ steps.golangci.outputs.exitcode }}');
            const pass = exitcode === 0;
            const lines = (output || '').split('\n').filter(l => /^\S+:\d+:\d+:/.test(l));
            let body = `## 🔷 Go Lint (golangci-lint) ${pass ? '✅' : '❌'}\n\n**Result:** ${pass ? '✅ Pass' : '❌ Fail'} — ${lines.length} issue${lines.length !== 1 ? 's' : ''} found\n\n`;
            if (lines.length > 0) {
              body += '| # | File | Line | Linter | Message |\n|---|------|------|--------|---------|\n';
              const show = lines.slice(0, 25);
              show.forEach((l, i) => {
                const parts = l.match(/^(.+?):(\d+):(\d+):\s*(\S+):\s*(.+)$/);
                if (parts) {
                  const file = parts[1].replace('mcp/reasoning-memory/', '');
                  body += `| ${i+1} | \`${file}\` | ${parts[2]} | \`${parts[4]}\` | ${parts[5]} |\n`;
                }
              });
              if (lines.length > 25) {
                body += `| ... | *${lines.length - 25} more* | | | |\n`;
              }
            } else {
              body += '✅ All checks passed. No lint issues found.\n';
            }
            body += `\n<details><summary>Full output</summary>\n\n\`\`\`\n${output.slice(0, 3000)}\n\`\`\`\n</details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
