version: 2
updates:
  - package-ecosystem: gomod
    directory: /mcp/reasoning-memory
    schedule:
      interval: daily
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 10

  - package-ecosystem: pip
    directory: /mcp/credential-vault
    schedule:
      interval: daily
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 10

  - package-ecosystem: pip
    directory: /mcp/pr-reviewer
    schedule:
      interval: daily
      time: "06:00"
      timezone: UTC
    open-pull-requests-limit: 10
