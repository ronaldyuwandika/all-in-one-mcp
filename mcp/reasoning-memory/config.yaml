version: 1
episodes_dir: episodes
index_dir: index
patterns_dir: patterns
vector_dir: vector
embedding:
  provider: ollama
  model: nomic-embed-text
  base_url: http://localhost:11434
  enabled: false
retrieval:
  top_k_default: 3
  min_similarity: 0.15
  hybrid_weight: 0.5
consolidation:
  prune_after_days: 90
  min_episodes_for_pattern: 3
  auto_run: true
